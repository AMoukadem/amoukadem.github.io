name: Deploy website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install Tailwind CLI where Hugo expects it: ./node_modules/.bin/tailwindcss
      - name: Install Tailwind CLI (v3) for Hugo
        run: |
          npm ci --ignore-scripts || true
          npm install -D tailwindcss@3.4.17 postcss autoprefixer
          ./node_modules/.bin/tailwindcss --help > /dev/null

      - name: Get Hugo version
        run: |
          if [ -f "hugoblox.yaml" ]; then
            VERSION=$(grep "hugo_version" hugoblox.yaml | awk '{print $2}' | tr -d "'\"")
            echo "HUGO_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "HUGO_VERSION=latest" >> $GITHUB_ENV
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_BLOX_LICENSE: ${{ secrets.HUGO_BLOX_LICENSE }}
        run: |
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: github.repository_owner != 'HugoBlox'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
