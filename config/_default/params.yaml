hugoblox:
  schema: "2.0"

  theme:
    mode: light        # ou system si tu veux un dark auto
    pack: "minimal"    # propre, académique

    colors:
      primary: "#007EE3"   # approx de ton myBlue (cmyk 1,.50,.10,.01)
      secondary: "#005596" # uhaBlue
      neutral: "slate"     # gamme de gris nette

    # Optionnel si tu veux verrouiller le fond “papier”
    surfaces:
      background: "#ffffff"
      foreground: "#0b0f14"  # pas noir pur -> plus élégant
      header:
        background: "#ffffff"
        foreground: "#0b0f14"
      footer:
        background: "#ffffff"
        foreground: "#0b0f14"

  typography:
    font: "serif"  # ambiance académique globale
    size: "md"

  layout:
    radius: "md"          # coins arrondis façon “rounded”
    spacing: "comfortable"
    avatar_shape: circle

