      - name: Prepare Tailwind toolchain
        run: |
          set -euo pipefail
          mkdir -p _tw
          cd _tw

          cat > package.json <<'JSON'
          {
            "name": "tw",
            "private": true,
            "devDependencies": {
              "tailwindcss": "3.4.17",
              "postcss": "8.4.38",
              "autoprefixer": "10.4.19"
            }
          }
          JSON

          pnpm install

          # Expose the binary directory
          echo "$PWD/node_modules/.bin" >> $GITHUB_PATH

          # Sanity check (do NOT use -v, it expects an input)
          ./node_modules/.bin/tailwindcss --help > /dev/null
