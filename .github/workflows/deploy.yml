name: Deploy website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.12.3"

      # ✅ FIX: Tailwind v4 CLI is @tailwindcss/cli (tailwindcss alone has no CLI)
      - name: Install Tailwind v4 CLI (required by Hugo)
        run: |
          set -euo pipefail
          # Install in repo root so npx + Hugo can find it
          pnpm add -D tailwindcss@latest @tailwindcss/cli@latest @tailwindcss/typography@latest
          # Debug: prove Hugo will find the binary
          ls -la node_modules/.bin | sed -n '1,200p'
          npx --no-install tailwindcss --help >/dev/null || true
          npx --no-install @tailwindcss/cli --help >/dev/null || true

      - name: Get Hugo version
        run: |
          if [ -f "hugoblox.yaml" ]; then
            VERSION=$(grep "hugo_version" hugoblox.yaml | awk '{print $2}' | tr -d "'\"")
            echo "HUGO_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "HUGO_VERSION=latest" >> $GITHUB_ENV
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_BLOX_LICENSE: ${{ secrets.HUGO_BLOX_LICENSE }}
        run: |
          set -euo pipefail
          hugo version
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: github.repository_owner != 'HugoBlox'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
